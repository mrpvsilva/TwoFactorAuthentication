version: '3.4'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tfa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - 5432:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  tfa:
    image: tfa
    container_name: tfa
    build:
      context: .
    ports:
      - 4000:8080
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=tfa;Username=postgres;Password=postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
